name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  schedule:
    # Run daily at 00:00 UTC to check for upstream updates
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: openclaw/openclaw

jobs:
  check-upstream:
    name: Check upstream latest tag
    runs-on: ubuntu-latest
    # Only run the tag check for scheduled runs; skip for push/PR/manual
    if: github.event_name == 'schedule'
    permissions:
      contents: read
    outputs:
      upstream_changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Get latest upstream tag
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/${{ env.UPSTREAM_REPO }}/tags --jq '.[0].name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Restore cached upstream tag
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: upstream-tag.txt
          key: upstream-tag-${{ steps.upstream.outputs.tag }}

      - name: Determine whether upstream changed
        id: check
        run: |
          if [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
            echo "Upstream tag has not changed. Skipping build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Upstream tag changed (or no cached tag found). Triggering build."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write upstream tag to file
        if: steps.check.outputs.changed == 'true'
        run: echo "${{ steps.upstream.outputs.tag }}" > upstream-tag.txt

      - name: Save new upstream tag to cache
        if: steps.check.outputs.changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: upstream-tag.txt
          key: upstream-tag-${{ steps.upstream.outputs.tag }}

  build-and-push:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    needs: [check-upstream]
    # Run when:
    #   - triggered by push or pull_request or workflow_dispatch (check-upstream is skipped → needs result is 'skipped')
    #   - OR triggered by schedule AND upstream changed
    if: |
      always() && (
        needs.check-upstream.result == 'skipped' ||
        (needs.check-upstream.result == 'success' && needs.check-upstream.outputs.upstream_changed == 'true')
      )
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule,value=latest
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  delete-artifacts:
    name: Delete old workflow artifacts
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: always()
    permissions:
      actions: write

    steps:
      - name: Delete artifacts from this workflow run
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              }
            );
            for (const artifact of artifacts) {
              core.info(`Deleting artifact: ${artifact.name} (id=${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
            core.info(`Deleted ${artifacts.length} artifact(s).`);
